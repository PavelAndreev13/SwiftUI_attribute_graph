<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftUI Attribute Graph — Final Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Встроенные SVG иконки с корректными фрагментами
        const Icon = ({ name, className }) => {
            const icons = {
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2" />,
                mouse: <path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z" />,
                settings: (
                    <React.Fragment>
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </React.Fragment>
                ),
                monitor: (
                    <React.Fragment>
                        <rect width="20" height="14" x="2" y="3" rx="2"/>
                        <line x1="8" x2="16" y1="21" y2="21"/>
                        <line x1="12" x2="12" y1="17" y2="21"/>
                    </React.Fragment>
                ),
                check: (
                    <React.Fragment>
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </React.Fragment>
                ),
                paint: (
                    <React.Fragment>
                        <path d="m12 19 7-7 3 3-7 7-3-3z"/>
                        <path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                        <path d="m2 2 20 20"/>
                    </React.Fragment>
                ),
                ban: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="m4.93 4.93 14.14 14.14"/>
                    </React.Fragment>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        function GraphNode({ x, y, title, subtitle, styleClass, iconName, isPulsing }) {
            return (
                <foreignObject x={x - 75} y={y - 40} width="150" height="80" className="overflow-visible">
                    <div className={`w-full h-full ${styleClass} ${isPulsing ? 'animate-pulse' : ''} relative`}>
                        {iconName && <Icon name={iconName} className="w-6 h-6 mb-1" />}
                        <span className="font-bold text-sm text-center px-2 leading-tight">{title}</span>
                        {subtitle && <span className="text-xs opacity-80 mt-1">{subtitle}</span>}
                        {styleClass && styleClass.includes('opacity-60') && (
                           <div className="absolute -top-3 -right-3 bg-slate-200 text-slate-600 rounded-full p-1 shadow-sm">
                             <Icon name="ban" className="w-4 h-4" />
                           </div>
                        )}
                    </div>
                </foreignObject>
            );
        }

        function App() {
            const [step, setStep] = useState(0);

            const stepsData = [
                {
                    title: "Step 1 — At rest",
                    text: "All graph nodes are valid. SwiftUI recalculates nothing — the UI is stable.",
                    action: "System Idle"
                },
                {
                    title: "Step 2 — A change occurs",
                    text: "The user taps a button; count becomes 1. SwiftUI detects that a node's value has changed and begins traversing its outgoing edges.",
                    action: "User Tap!"
                },
                {
                    title: "Step 3 — Marking (invalidation)",
                    text: "SwiftUI follows only the edges leading from the changed node. CounterView.body reads count — it's marked dirty. HeaderView, BgView, and ProfileView don't depend on count — they are skipped entirely.",
                    action: "Graph Traversal"
                },
                {
                    title: "Step 4 — Re-evaluate",
                    text: "On the next render cycle, SwiftUI calls body only on the marked views. It receives a new UI description. The remaining body methods are never invoked.",
                    action: "Calling View.body"
                },
                {
                    title: "Step 5 — Result",
                    text: "The diff between the old and new trees reveals that only one Text has changed. That element alone is re-drawn. The other three render layers are untouched. The graph is stable once again.",
                    action: "Core Animation / Rendering"
                }
            ];

            const getNodeStyle = (nodeType) => {
                const base = "transition-all duration-500 border-4 shadow-sm flex flex-col items-center justify-center rounded-xl bg-white";
                const stable = `${base} border-slate-300 text-slate-500`;
                const active = `${base} border-emerald-500 bg-emerald-50 text-emerald-700 shadow-md`;
                
                if (nodeType === 'state') {
                    if (step === 0) return stable;
                    if (step === 1) return `${base} border-amber-500 bg-amber-100 text-amber-800 scale-105 shadow-amber-200 shadow-lg`;
                    return active;
                }
                if (nodeType === 'counterView') {
                    if (step < 2) return stable;
                    if (step === 2) return `${base} border-rose-500 bg-rose-50 text-rose-700 scale-105 shadow-rose-200 shadow-lg`;
                    if (step === 3) return `${base} border-blue-500 bg-blue-50 text-blue-700 scale-105 shadow-blue-200 shadow-lg`;
                    return active;
                }
                if (nodeType === 'skippedView') {
                    if (step >= 2) return `${base} border-slate-200 text-slate-400 opacity-60`;
                    return stable;
                }
                if (nodeType === 'counterRender') {
                    if (step < 4) return stable;
                    if (step === 4) return `${base} border-purple-500 bg-purple-100 text-purple-800 scale-110 shadow-purple-300 shadow-lg`;
                    return active;
                }
                if (nodeType === 'skippedRender') {
                    if (step >= 4) return `${base} border-slate-200 text-slate-400 opacity-60`;
                    return stable;
                }
                return stable;
            };

            return (
                <div className="min-h-screen bg-slate-50 p-6 flex flex-col font-sans items-center">
                    <style>{`
                        @keyframes flow { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
                        .line-flow { stroke-dasharray: 8 8; animation: flow 0.6s linear infinite; }
                    `}</style>

                    <div className="max-w-5xl w-full bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col">
                        <div className="bg-slate-900 text-white p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold">SwiftUI Attribute Graph</h1>
                                <p className="text-slate-400 text-sm mt-1">Re-evaluate vs Re-draw</p>
                            </div>
                            <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-full">
                                {stepsData.map((_, i) => (
                                    <button
                                        key={i}
                                        onClick={() => setStep(i)}
                                        className={`w-10 h-10 rounded-full font-bold transition-colors ${
                                            step === i ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/30' : 
                                            step > i ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-800 text-slate-500 hover:bg-slate-700'
                                        }`}
                                    >
                                        {i + 1}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="p-6 bg-blue-50 border-b border-blue-100 flex flex-col md:flex-row gap-6 items-start">
                            <div className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold uppercase tracking-wide text-sm whitespace-nowrap shadow-sm">
                                {stepsData[step].action}
                            </div>
                            <div>
                                <h2 className="text-lg font-bold text-slate-800 mb-2">{stepsData[step].title}</h2>
                                <p className="text-slate-600 leading-relaxed">{stepsData[step].text}</p>
                            </div>
                        </div>

                        <div className="w-full overflow-x-auto p-8 bg-slate-50 flex justify-center custom-scrollbar">
                            <div className="min-w-[900px]">
                                <svg viewBox="0 0 1000 500" className="w-full h-auto drop-shadow-sm">
                                    <path 
                                        d="M 500 120 L 380 240" 
                                        fill="none" 
                                        stroke={step >= 2 ? (step === 2 ? '#ef4444' : '#22c55e') : '#cbd5e1'} 
                                        strokeWidth={step === 2 ? 4 : 2}
                                        className={step === 2 ? 'line-flow' : ''}
                                    />
                                    {[140, 380, 620, 860].map((x, i) => {
                                        const isCounter = x === 380;
                                        let strokeColor = '#cbd5e1';
                                        let strokeWidth = 2;
                                        let isFlowing = false;

                                        if (isCounter && step === 4) {
                                           strokeColor = '#a855f7';
                                           strokeWidth = 4;
                                           isFlowing = true;
                                        } else if (isCounter && step > 4) {
                                           strokeColor = '#22c55e';
                                        }

                                        return (
                                            <path 
                                                key={i}
                                                d={`M ${x} 320 L ${x} 420`} 
                                                fill="none" 
                                                stroke={strokeColor} 
                                                strokeWidth={strokeWidth}
                                                className={isFlowing ? 'line-flow' : ''}
                                            />
                                        )
                                    })}

                                    <GraphNode 
                                        x={500} y={80} 
                                        title="@State var count" 
                                        subtitle="Data Source"
                                        styleClass={getNodeStyle('state')}
                                        iconName={step === 1 ? "mouse" : (step > 1 ? "check" : "activity")}
                                        isPulsing={step === 1}
                                    />

                                    <text x="30" y="240" className="text-xs font-bold text-slate-400 uppercase tracking-widest" transform="rotate(-90 30 240)">View Graph</text>
                                    <line x1="60" y1="240" x2="940" y2="240" stroke="#e2e8f0" strokeWidth="20" strokeLinecap="round" opacity="0.3"/>

                                    <GraphNode x={140} y={280} title="HeaderView" subtitle="body" styleClass={getNodeStyle('skippedView')} />
                                    <GraphNode 
                                        x={380} y={280} 
                                        title="CounterView" subtitle="body" 
                                        styleClass={getNodeStyle('counterView')}
                                        iconName={step === 3 ? "settings" : undefined}
                                        isPulsing={step === 3}
                                    />
                                    <GraphNode x={620} y={280} title="BgView" subtitle="body" styleClass={getNodeStyle('skippedView')} />
                                    <GraphNode x={860} y={280} title="ProfileView" subtitle="body" styleClass={getNodeStyle('skippedView')} />

                                    <text x="30" y="420" className="text-xs font-bold text-slate-400 uppercase tracking-widest" transform="rotate(-90 30 420)">Screen</text>
                                    <line x1="60" y1="420" x2="940" y2="420" stroke="#e2e8f0" strokeWidth="20" strokeLinecap="round" opacity="0.3"/>

                                    <GraphNode x={140} y={460} title="Text('Header')" subtitle="Pixels" styleClass={getNodeStyle('skippedRender')} iconName="monitor" />
                                    <GraphNode 
                                        x={380} y={460} 
                                        title="Text('\(count)')" subtitle="Pixels" 
                                        styleClass={getNodeStyle('counterRender')}
                                        iconName={step === 4 ? "paint" : "monitor"}
                                        isPulsing={step === 4}
                                    />
                                    <GraphNode x={620} y={460} title="Color.blue" subtitle="Pixels" styleClass={getNodeStyle('skippedRender')} iconName="monitor" />
                                    <GraphNode x={860} y={460} title="Image('profile')" subtitle="Pixels" styleClass={getNodeStyle('skippedRender')} iconName="monitor" />
                                </svg>
                            </div>
                        </div>
                        
                        <div className="bg-slate-100 p-4 border-t border-slate-200 flex justify-between">
                            <button 
                                onClick={() => setStep(Math.max(0, step - 1))}
                                disabled={step === 0}
                                className="px-6 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                Previous
                            </button>
                            
                            <button 
                                onClick={() => setStep(step === 4 ? 0 : step + 1)}
                                className="px-6 py-2 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors flex items-center gap-2 shadow-md shadow-blue-500/20"
                            >
                                {step === 4 ? 'Restart Cycle' : 'Next Step'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
